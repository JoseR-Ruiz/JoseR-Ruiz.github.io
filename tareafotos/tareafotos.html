<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Grid</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      background: #f5f5f5;
      padding: 2rem;
      font-family: sans-serif;
    }
 
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      max-width: 900px;
      margin: 0 auto;
    }
 
    .img-card {
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      background: #e0e0e0;
    }
 
    .img-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
 
    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

    <h1>Tarea fotos</h1>
 
  <div class="grid">
    <div class="img-card"><img src="1.jpg" alt="Image 1" /></div>
    <div class="img-card"><img src="2.jpg" alt="Image 2" /></div>
    <div class="img-card"><img src="3.jpg" alt="Image 3" /></div>
    <div class="img-card"><img src="4.jpg" alt="Image 4" /></div>
    <div class="img-card"><img src="5.jpg" alt="Image 5" /></div>
    <div class="img-card"><img src="6.jpg" alt="Image 6" /></div>
  </div>
 
</body>
</html>
